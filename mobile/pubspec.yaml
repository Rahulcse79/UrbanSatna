name: servexa
description: Servexa — hyperlocal service marketplace (customer app).
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.0
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  video_player: ^2.9.1
  geolocator: ^13.0.1
  geocoding: ^4.0.0
  intl: any # version pinned by flutter_localizations

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
