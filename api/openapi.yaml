openapi: 3.1.0
info:
  title: Servexa API (UrbanSatna platform)
  version: 0.5.0
  description: |
    Service marketplace API. Source of truth for the REST contract.
    Every response uses the envelope `{ success, data, error, meta }`;
    clients switch on stable `error.code` values (SCREAMING_SNAKE), never
    on messages. Codes: VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN,
    NOT_FOUND, CONFLICT, RATE_LIMITED, OTP_INVALID, OTP_EXPIRED,
    SERVICE_UNAVAILABLE, INTERNAL_ERROR.

    Auth: Bearer JWT access token (15 min) + rotating opaque refresh
    token (30 days). Roles/permissions are embedded in the JWT.
    Exactly three fixed roles: customer | serviceman | admin.

    Paginated explore lists (services by category, search) return one
    10-row page per request with `meta: {page, per_page, total}`.

servers:
  - url: http://localhost:8080
  - url: https://urbansatna.onrender.com
    description: production (Render)

tags:
  - name: system
  - name: auth
  - name: profile
  - name: catalog
  - name: bookings
  - name: jobs
  - name: admin

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness/readiness (DB + Redis); 200 ok / 503 degraded
      responses: { "200": { description: healthy }, "503": { description: degraded } }
  /metrics:
    get:
      tags: [system]
      summary: Prometheus metrics
      responses: { "200": { description: metrics text } }

  /api/v1/app-config:
    get:
      tags: [system]
      summary: >-
        Public runtime config: {allow_server_url_change, promo_enabled,
        promo_title?, promo_subtitle?, maintenance_mode, min_build,
        latest_build, require_latest, city_label?, app_display_name?,
        tagline?, theme_preset, support_phone?, announcement_enabled,
        announcement_text?, bookings_paused, bookings_paused_message?,
        max_active_bookings, user_policy_text?, acceptance_text?,
        support_online}. Version gate: app is blocked when
        build < min_build, or build < latest_build while require_latest.
        theme_preset ∈ indigo|emerald|crimson|royal|ocean|sunset|teal|gold|rose.
      responses: { "200": { description: config } }
    patch:
      tags: [system]
      security: [{ bearerAuth: [] }]
      summary: Admin edits any subset of the flags above (perm settings:manage)
      responses: { "200": { description: updated config }, "403": { description: FORBIDDEN } }

  /api/v1/auth/otp/request:
    post:
      tags: [auth]
      summary: Send login OTP (rate-limited 3/10min; dev may return dev_otp)
      requestBody: { $ref: "#/components/requestBodies/Phone" }
      responses: { "200": { description: OTP sent }, "429": { description: RATE_LIMITED } }
  /api/v1/auth/otp/verify:
    post:
      tags: [auth]
      summary: Verify OTP; creates user on first login; returns TokenPair
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone: { type: string }
                otp: { type: string }
                device_id: { type: string }
                device_name: { type: string }
      responses: { "200": { description: TokenPair }, "401": { description: OTP_INVALID | OTP_EXPIRED } }
  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate refresh token; returns new TokenPair (old token dies)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties: { refresh_token: { type: string } }
      responses: { "200": { description: TokenPair }, "401": { description: UNAUTHORIZED } }
  /api/v1/auth/logout:
    post:
      tags: [auth]
      security: [{ bearerAuth: [] }]
      summary: Revoke this session (or all with {"all_devices":true})
      responses: { "200": { description: revoked } }

  /api/v1/me:
    get:
      tags: [profile]
      security: [{ bearerAuth: [] }]
      summary: Current user profile + roles
      responses: { "200": { description: profile } }
    patch:
      tags: [profile]
      security: [{ bearerAuth: [] }]
      summary: Update full_name / email
      responses: { "200": { description: updated profile } }
  /api/v1/me/avatar:
    get:
      tags: [profile]
      security: [{ bearerAuth: [] }]
      summary: Own profile photo (image bytes); 404 when unset
      responses: { "200": { description: image/png or image/jpeg }, "404": { description: none } }
    post:
      tags: [profile]
      security: [{ bearerAuth: [] }]
      summary: Upload profile photo — raw body, PNG/JPG, ≤ 1 MB, magic-byte checked
      responses: { "200": { description: updated }, "422": { description: VALIDATION_ERROR } }
  /api/v1/me/worker-application:
    get:
      tags: [profile]
      security: [{ bearerAuth: [] }]
      summary: Latest worker application (null when never applied)
      responses: { "200": { description: "WorkerApplication | null" } }
    post:
      tags: [profile]
      security: [{ bearerAuth: [] }]
      summary: >-
        Apply to become a worker {skills?, experience?}. Role is granted
        only on admin approval. Staff (admin) accounts are rejected.
      responses: { "200": { description: pending application }, "409": { description: CONFLICT } }
  /api/v1/me/worker-application/kyc/{kind}:
    post:
      tags: [profile]
      security: [{ bearerAuth: [] }]
      summary: "Attach KYC photo to pending application; kind: doc | selfie (PNG/JPG ≤ 1 MB)"
      parameters: [{ name: kind, in: path, required: true, schema: { type: string, enum: [doc, selfie] } }]
      responses: { "200": { description: uploaded }, "409": { description: no pending application } }
  /api/v1/me/become-worker:
    post:
      tags: [profile]
      security: [{ bearerAuth: [] }]
      deprecated: true
      summary: Legacy alias of POST /me/worker-application (old APKs)
      responses: { "200": { description: pending application } }

  /api/v1/categories:
    get:
      tags: [catalog]
      summary: Active categories (public)
      responses: { "200": { description: "[{id,name,icon,sort_order}]" } }
    post:
      tags: [catalog]
      security: [{ bearerAuth: [] }]
      summary: Create category (perm catalog:manage)
      responses: { "200": { description: category }, "403": { description: FORBIDDEN } }
  /api/v1/categories/{id}/services:
    get:
      tags: [catalog]
      summary: >-
        Active services of a category (public), 10 per page —
        meta: {page, per_page: 10, total}
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
      responses: { "200": { description: "[{id,name,description,base_price_paise,duration_min}] + meta" } }
  /api/v1/services/search:
    get:
      tags: [catalog]
      summary: >-
        Public search across service name/description/category with an
        optional price ceiling; 10 results per page, cheapest first —
        meta: {page, per_page: 10, total}
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: max_price_paise, in: query, schema: { type: integer, format: int64 } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
      responses: { "200": { description: "[SearchResult] + meta" } }
  /api/v1/categories/{id}:
    patch:
      tags: [catalog]
      security: [{ bearerAuth: [] }]
      summary: Update category {name?, icon?, sort_order?, is_active?} (perm catalog:manage)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses: { "200": { description: category }, "404": { description: NOT_FOUND } }
  /api/v1/services:
    post:
      tags: [catalog]
      security: [{ bearerAuth: [] }]
      summary: Create service (perm catalog:manage)
      responses: { "200": { description: service } }
  /api/v1/services/{id}:
    patch:
      tags: [catalog]
      security: [{ bearerAuth: [] }]
      summary: Update service {name?, description?, base_price_paise?, duration_min?, is_active?}
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses: { "200": { description: service }, "404": { description: NOT_FOUND } }

  /api/v1/bookings:
    post:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: >-
        Create booking {service_id, address, note?}; price snapshotted.
        Blocked (409) while bookings_paused or when the customer already
        has max_active_bookings active.
      responses:
        "200": { description: Booking }
        "409": { description: paused / active cap reached }
        "422": { description: VALIDATION_ERROR }
  /api/v1/bookings/mine:
    get:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: My bookings; ?scope=active(default)|past
      responses: { "200": { description: "[Booking]" } }
  /api/v1/bookings/{id}/cancel:
    post:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: "Customer cancels (pending/accepted only); body: {reason?}"
      responses: { "200": { description: Booking }, "409": { description: CONFLICT } }
  /api/v1/bookings/{id}/rate:
    post:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: Rate a completed booking once {rating 1-5, review?}
      responses: { "200": { description: Booking }, "409": { description: CONFLICT } }
  /api/v1/bookings/{id}/accept:
    post:
      tags: [jobs]
      security: [{ bearerAuth: [] }]
      summary: Worker accepts a pending job (first accept wins)
      responses: { "200": { description: Booking }, "409": { description: already taken } }
  /api/v1/bookings/{id}/status:
    patch:
      tags: [jobs]
      security: [{ bearerAuth: [] }]
      summary: >-
        Assigned worker advances: {action: en_route|arrived|start|complete,
        otp?}. `start` requires the customer's 4-digit arrival OTP.
      responses:
        "200": { description: Booking }
        "401": { description: OTP_INVALID }
        "409": { description: invalid transition }

  /api/v1/jobs/available:
    get:
      tags: [jobs]
      security: [{ bearerAuth: [] }]
      summary: Unassigned pending jobs (role serviceman)
      responses: { "200": { description: "[Booking]" } }
  /api/v1/jobs/mine:
    get:
      tags: [jobs]
      security: [{ bearerAuth: [] }]
      summary: Worker's active jobs
      responses: { "200": { description: "[Booking]" } }
  /api/v1/jobs/earnings:
    get:
      tags: [jobs]
      security: [{ bearerAuth: [] }]
      summary: "{completed_jobs, total_paise, avg_rating}"
      responses: { "200": { description: earnings } }

  /api/v1/jobs/history:
    get:
      tags: [jobs]
      security: [{ bearerAuth: [] }]
      summary: Worker payment history (completed jobs, newest first)
      responses: { "200": { description: "[Booking]" } }
  /api/v1/coupons/check:
    get:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: "Quote a coupon for me: ?code=&service_id= → {discount_paise, final_paise}; 409 when already used (one use per user, forever)"
      responses: { "200": { description: quote }, "404": { description: invalid }, "409": { description: already used } }
  /api/v1/tickets:
    post:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: Raise a support ticket {subject, message, booking_id?}
      responses: { "200": { description: Ticket } }
  /api/v1/tickets/mine:
    get:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: My tickets with status + resolution
      responses: { "200": { description: "[Ticket]" } }
  /api/v1/bookings/{id}/messages:
    get:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: Booking chat (participants; staff read via bookings:read:any)
      responses: { "200": { description: "[ChatMessage]" }, "403": { description: FORBIDDEN } }
    post:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: "Send text message {body} (participants only)"
      responses: { "200": { description: ChatMessage } }
  /api/v1/bookings/{id}/messages/attachment:
    post:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: Attach media — raw body, PNG/JPG/MP4 ≤ 15 MB, magic-checked
      responses: { "200": { description: ChatMessage }, "422": { description: VALIDATION_ERROR } }
  /api/v1/bookings/{id}/messages/{mid}/attachment:
    get:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: Download an attachment (participants/staff)
      responses: { "200": { description: media bytes }, "404": { description: none } }
  /api/v1/admin/coupons:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: List coupons (perm catalog:manage)
      responses: { "200": { description: "[Coupon]" } }
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: "Create coupon {code, percent_off(1-90) XOR flat_off_paise}"
      responses: { "200": { description: Coupon }, "409": { description: duplicate code } }
  /api/v1/admin/coupons/{id}:
    patch:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: "Toggle coupon {is_active} — redemptions never reset"
      responses: { "200": { description: Coupon } }
  /api/v1/admin/tickets:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: >-
        Support queue ?status=open(default)|resolved|closed&page=1
        (perm bookings:manage:any). Returns a paginated object
        {items: [Ticket], total, page, per_page: 10} — NOT a bare list.
      responses: { "200": { description: "{items, total, page, per_page}" } }
  /api/v1/admin/tickets/{id}/resolve:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: "Resolve a ticket {resolution} (audited; once only)"
      responses: { "200": { description: Ticket }, "409": { description: already resolved } }
  /api/v1/admin/tickets/{id}/close:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Permanently close a ticket; the customer cannot reopen it
      responses: { "200": { description: Ticket }, "409": { description: already closed } }
  /api/v1/tickets/{id}/reopen:
    post:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: Customer reopens their resolved (not closed) ticket
      responses: { "200": { description: Ticket }, "409": { description: CONFLICT } }

  /api/v1/support/messages:
    get:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: My live-support thread (bot answers while support_online=false)
      responses: { "200": { description: "[SupportMessage]" } }
    post:
      tags: [bookings]
      security: [{ bearerAuth: [] }]
      summary: "Send a support message {body ≤ 2000 chars}"
      responses: { "200": { description: SupportMessage } }
  /api/v1/admin/support/threads:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: >-
        Support inbox, one row per customer conversation (perm
        bookings:manage:any). Admin accounts never appear here.
      responses: { "200": { description: "[SupportThread]" } }
  /api/v1/admin/support/{user_id}/messages:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Read a customer's support thread
      parameters: [{ name: user_id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses: { "200": { description: "[SupportMessage]" } }
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: >-
        Staff reply {body}. Support chat is staff → customer only:
        replying to another admin account returns 409 CONFLICT.
      parameters: [{ name: user_id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses: { "200": { description: SupportMessage }, "409": { description: target is an admin } }

  /api/v1/admin/worker-applications:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Verification queue; ?status=pending(default)|approved|rejected (perm workers:verify)
      responses: { "200": { description: "[WorkerApplication]" } }
  /api/v1/admin/worker-applications/{id}/decide:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: "Approve/reject: {approve: bool, note?}. Approval grants the serviceman role atomically."
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses: { "200": { description: decided }, "409": { description: already decided } }
  /api/v1/admin/worker-applications/{id}/kyc/{kind}:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: "KYC photo bytes; kind: doc | selfie (perm workers:verify)"
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: kind, in: path, required: true, schema: { type: string, enum: [doc, selfie] } }
      responses: { "200": { description: image }, "404": { description: none } }
  /api/v1/admin/catalog/categories:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: All categories incl. deactivated (perm catalog:manage)
      responses: { "200": { description: "[Category]" } }
  /api/v1/admin/catalog/categories/{id}/services:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: All services of a category incl. deactivated (perm catalog:manage)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses: { "200": { description: "[Service]" } }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  requestBodies:
    Phone:
      content:
        application/json:
          schema:
            type: object
            required: [phone]
            properties:
              phone: { type: string, description: "E.164, e.g. +919876543210" }
  schemas:
    Booking:
      type: object
      description: |
        Central booking object returned by all booking/job endpoints.
        Redaction rules: `arrival_otp` appears only in customer responses;
        `customer_phone` is hidden on the open job feed and revealed to the
        assigned worker after accept (contact exchange like Uber).
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [pending, accepted, en_route, arrived, in_progress, completed, cancelled] }
        service_id: { type: string, format: uuid }
        service_name: { type: string }
        category_name: { type: string }
        customer_id: { type: string, format: uuid }
        customer_name: { type: string, nullable: true }
        customer_phone: { type: string, nullable: true }
        worker_id: { type: string, format: uuid, nullable: true }
        worker_name: { type: string, nullable: true }
        worker_phone: { type: string, nullable: true }
        address: { type: string }
        note: { type: string, nullable: true }
        price_paise: { type: integer, format: int64 }
        rating: { type: integer, nullable: true }
        review: { type: string, nullable: true }
        arrival_otp: { type: string, nullable: true, description: customer-only }
        created_at: { type: string, format: date-time }
    WorkerApplication:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        phone: { type: string }
        full_name: { type: string, nullable: true }
        status: { type: string, enum: [pending, approved, rejected] }
        skills: { type: string, nullable: true }
        experience: { type: string, nullable: true }
        note: { type: string, nullable: true, description: admin decision note }
        has_kyc_doc: { type: boolean }
        has_kyc_selfie: { type: boolean }
        created_at: { type: string, format: date-time }
        decided_at: { type: string, format: date-time, nullable: true }
