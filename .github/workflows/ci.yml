name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  migrations:
    name: Migration guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Migration history is append-only
        run: backend/scripts/check_migrations.sh
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}

  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
      - name: Build
        run: cargo build

  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Dependencies
        run: flutter pub get
      - name: Generate localizations
        run: flutter gen-l10n
      - name: Analyze
        run: flutter analyze
      - name: Tests
        run: flutter test
