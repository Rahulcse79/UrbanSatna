name: Mobile Release Builds

# Builds installable artifacts for the Flutter app:
#   - Android: release APK (debug-signed until a Play keystore is configured)
#   - iOS: unsigned .ipa (no Apple signing certificates in CI yet)
#
# Trigger manually (workflow_dispatch) or by pushing a v* tag.
# Set the repository variable API_BASE_URL to point builds at a real server.

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend URL baked into the app (e.g. http://192.168.1.10:8080)"
        required: false
        type: string
  push:
    tags: ["v*"]

env:
  FLUTTER_CHANNEL: stable

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # Platform folders are not committed yet; generate them when missing.
      # --org com + project servexa => applicationId com.servexa.
      # ("in" is a Kotlin keyword and breaks build.gradle.kts namespaces.)
      # Once real android/ files are committed this step is a no-op.
      - name: Ensure Android platform files
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --org com --project-name servexa .
          fi
          # Release builds need INTERNET explicitly, and Android 9+ blocks
          # plain http:// unless cleartext is allowed — required while the
          # test backend runs on a LAN IP without TLS.
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i 's#^<manifest\([^>]*\)>#<manifest\1>\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />#' "$MANIFEST"
          fi
          if ! grep -q 'usesCleartextTraffic' "$MANIFEST"; then
            sed -i 's#<application#<application android:usesCleartextTraffic="true"#' "$MANIFEST"
          fi
          # Launcher shows the brand name, not the package name.
          sed -i 's#android:label="servexa"#android:label="Servexa"#' "$MANIFEST"
          # Android 11+ package visibility: without <queries>, url_launcher
          # cannot resolve tel: (call buttons) or https: (Maps navigate).
          if ! grep -q '<queries>' "$MANIFEST"; then
            sed -i 's#</manifest>#    <queries>\n        <intent><action android:name="android.intent.action.DIAL" /></intent>\n        <intent><action android:name="android.intent.action.VIEW" /><data android:scheme="https" /></intent>\n    </queries>\n</manifest>#' "$MANIFEST"
          fi
          grep -E 'INTERNET|usesCleartextTraffic|android:label|queries' "$MANIFEST"

      # Deterministic signing: the committed test keystore means every CI
      # build has the same signature, so phones update in place instead of
      # demanding an uninstall. Replace with a real keystore for Play Store.
      - name: Stable debug signing key
        run: |
          mkdir -p ~/.android
          cp ci/debug.keystore ~/.android/debug.keystore

      - name: Dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      # Versioning: versionName 0.1.<run>, versionCode <run> — monotonic,
      # so Android accepts every new build as an upgrade. APP_BUILD is the
      # same number, shown in Settings and compared against the admin-set
      # min_build flag for force updates.
      - name: Build APK
        env:
          API_BASE_URL: ${{ inputs.api_base_url || vars.API_BASE_URL }}
        run: >
          flutter build apk --release
          --build-name=0.1.${{ github.run_number }}
          --build-number=${{ github.run_number }}
          --dart-define=API_BASE_URL="${API_BASE_URL:-http://10.0.2.2:8080}"
          --dart-define=APP_BUILD=${{ github.run_number }}

      - name: Build AppBundle (Play Store)
        env:
          API_BASE_URL: ${{ inputs.api_base_url || vars.API_BASE_URL }}
        run: >
          flutter build appbundle --release
          --build-name=0.1.${{ github.run_number }}
          --build-number=${{ github.run_number }}
          --dart-define=API_BASE_URL="${API_BASE_URL:-http://10.0.2.2:8080}"
          --dart-define=APP_BUILD=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: servexa-android-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: servexa-android-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios:
    name: iOS (unsigned)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Ensure iOS platform files
        run: |
          if [ ! -d ios ]; then
            flutter create --platforms=ios --org com --project-name servexa .
          fi
          # Home screen shows the brand name, not the package name.
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c 'Set :CFBundleDisplayName Servexa' "$PLIST" \
            || /usr/libexec/PlistBuddy -c 'Add :CFBundleDisplayName string Servexa' "$PLIST"

      - name: Dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build iOS (no codesign)
        env:
          API_BASE_URL: ${{ inputs.api_base_url || vars.API_BASE_URL }}
        run: >
          flutter build ios --release --no-codesign
          --build-name=0.1.${{ github.run_number }}
          --build-number=${{ github.run_number }}
          --dart-define=API_BASE_URL="${API_BASE_URL:-http://10.0.2.2:8080}"
          --dart-define=APP_BUILD=${{ github.run_number }}

      # Unsigned ipa: installable via AltStore/Sideloadly or re-signable
      # later; proper TestFlight distribution needs Apple signing secrets.
      - name: Package unsigned ipa
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr servexa-ios-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: servexa-ios-unsigned-ipa
          path: mobile/build/ios/iphoneos/servexa-ios-unsigned.ipa
          if-no-files-found: error
